version: '3.8'
services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    command: npm run start:prod
    depends_on:
      - redis

  worker:
    build: .
    env_file:
      - .env
    command: npm run start:worker
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
